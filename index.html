<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Caro Online - Chơi cùng bạn bè</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f2b1d 0%, #1a3f2a 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
      padding: 16px;
    }

    .game-wrapper {
      max-width: 700px;
      width: 100%;
      background: rgba(30, 25, 18, 0.55);
      backdrop-filter: blur(8px);
      border-radius: 48px;
      padding: 20px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,215,130,0.6);
    }

    .game-header {
      text-align: center;
      margin-bottom: 16px;
    }
    .game-header h1 {
      font-size: 1.8rem;
      background: linear-gradient(135deg, #FFE6B0, #FFB347);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .game-header p {
      color: #f7e5b5;
      font-size: 0.8rem;
    }

    /* Mã phòng nổi bật trên đầu */
    .room-code-top {
      background: linear-gradient(135deg, #f7b32b, #e69500);
      text-align: center;
      padding: 12px 10px;
      border-radius: 50px;
      margin-bottom: 20px;
      font-weight: bold;
      font-size: 1rem;
      box-shadow: 0 3px 8px rgba(0,0,0,0.3);
      color: #2c1e0c;
      word-break: break-all;
    }
    .room-code-top span {
      font-size: 0.75rem;
      display: block;
      margin-top: 4px;
    }

    .room-panel {
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(4px);
      border-radius: 60px;
      padding: 12px 16px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .room-btn {
      background: #f7b32b;
      border: none;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: bold;
      border-radius: 40px;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 3px 0 0 #7a4a1a;
      color: #2c1e0c;
    }
    .room-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 0 #7a4a1a;
    }
    .room-input {
      background: #fff6e5;
      border: none;
      padding: 10px 16px;
      border-radius: 50px;
      font-size: 0.9rem;
      width: 160px;
      outline: none;
      text-align: center;
    }

    /* Bàn cờ - đã fix lỗi mobile */
    .board-container {
      background: #c7a45b;
      border-radius: 24px;
      padding: 12px;
      box-shadow: inset 0 0 0 2px #fcf3cf, 0 8px 16px rgba(0,0,0,0.4);
    }
    .board-grid {
      display: grid;
      grid-template-columns: repeat(15, 1fr);
      background-color: #faf0cf;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 1 / 1;
    }
    .cell {
      aspect-ratio: 1 / 1;
      background: #faf0cf;
      border: 0.5px solid #c49a6c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(12px, 3.5vw, 20px);
      font-weight: bold;
      cursor: pointer;
      font-family: monospace;
    }
    .cell:active {
      background: #ecdcaa;
      transform: scale(0.96);
    }
    .cell[data-value="X"] {
      color: #e34d4d;
      font-size: clamp(14px, 4vw, 22px);
    }
    .cell[data-value="O"] {
      color: #3b82f6;
      font-size: clamp(14px, 4vw, 22px);
    }

    .info-panel {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 18px;
    }
    .turn-card {
      background: #2c2419;
      border-radius: 60px;
      padding: 5px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .piece-badge {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #e63946;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: bold;
      color: white;
    }
    .piece-badge.O-turn {
      background: #3b82f6;
    }
    .turn-text {
      font-size: 1rem;
      font-weight: bold;
      color: #fbe9c3;
    }
    .room-code {
      background: #00000066;
      backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: 5px 16px;
      font-family: monospace;
      font-weight: bold;
      color: #ffdd99;
      font-size: 0.8rem;
    }
    .status-message {
      background: #00000099;
      backdrop-filter: blur(12px);
      border-radius: 40px;
      padding: 8px 16px;
      text-align: center;
      font-weight: bold;
      color: #fff0c0;
      font-size: 0.85rem;
      margin-top: 12px;
    }

    @media (max-width: 550px) {
      .game-wrapper { padding: 14px; }
      .room-btn { padding: 6px 14px; font-size: 0.75rem; }
      .room-input { width: 130px; font-size: 0.75rem; }
      .turn-text { font-size: 0.8rem; }
      .piece-badge { width: 32px; height: 32px; font-size: 18px; }
    }
  </style>
</head>
<body>

<div class="game-wrapper">
  <div class="game-header">
    <h1>⚡ CARO ONLINE ⚡</h1>
    <p>Tạo phòng - Mời bạn - Đấu trí 15x15</p>
  </div>

  <!-- Mã phòng hiển thị trên đầu -->
  <div id="roomCodeTop" class="room-code-top">
    🏠 Chưa có phòng
  </div>

  <div class="room-panel">
    <button class="room-btn" id="createRoomBtn">🎲 Tạo phòng</button>
    <input type="text" id="roomIdInput" class="room-input" placeholder="Nhập mã phòng">
    <button class="room-btn" id="joinRoomBtn">🚪 Vào phòng (O)</button>
  </div>

  <div class="board-container">
    <div id="board" class="board-grid"></div>
  </div>

  <div class="info-panel">
    <div class="turn-card">
      <div class="piece-badge" id="pieceBadge">❌</div>
      <div class="turn-text" id="turnText">Chưa vào phòng</div>
    </div>
    <div class="room-code" id="roomCodeDisplay">🏠 Chưa có phòng</div>
  </div>
  <div class="status-message" id="statusMsg">
    ✨ Tạo hoặc tham gia phòng để chơi ✨
  </div>
</div>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyB8d-H_rfEfJb5l-ArLjpeqPZHeh_9PD6k",
    authDomain: "caro-online-7c577.firebaseapp.com",
    projectId: "caro-online-7c577",
    storageBucket: "caro-online-7c577.firebasestorage.app",
    messagingSenderId: "587741989273",
    appId: "1:587741989273:web:df8141888d9e904a002b08",
    measurementId: "G-2WFXESM4V9"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  let room = "";
  let player = "";

  const boardContainer = document.getElementById("board");
  const roomIdInput = document.getElementById("roomIdInput");
  const roomCodeTop = document.getElementById("roomCodeTop");
  const roomCodeDisplaySpan = document.getElementById("roomCodeDisplay");
  const turnTextSpan = document.getElementById("turnText");
  const pieceBadgeDiv = document.getElementById("pieceBadge");
  const statusMsgDiv = document.getElementById("statusMsg");

  // Kiểm tra thắng 5 dòng
  function checkWinner(boardArray, lastIdx, curPlayer) {
    const size = 15;
    const row = Math.floor(lastIdx / size);
    const col = lastIdx % size;
    
    function count(dx, dy) {
      let cnt = 1;
      for (let step = 1; step <= 4; step++) {
        const nr = row + dx * step, nc = col + dy * step;
        if (nr < 0 || nr >= size || nc < 0 || nc >= size) break;
        if (boardArray[nr * size + nc] === curPlayer) cnt++;
        else break;
      }
      for (let step = 1; step <= 4; step++) {
        const nr = row - dx * step, nc = col - dy * step;
        if (nr < 0 || nr >= size || nc < 0 || nc >= size) break;
        if (boardArray[nr * size + nc] === curPlayer) cnt++;
        else break;
      }
      return cnt;
    }
    
    const dirs = [[1,0],[0,1],[1,1],[1,-1]];
    for (let [dx, dy] of dirs) {
      if (count(dx, dy) >= 5) return true;
    }
    return false;
  }

  function renderBoard(data) {
    const cells = boardContainer.querySelectorAll(".cell");
    for (let i = 0; i < 225; i++) {
      const val = data[i] || "";
      if (cells[i]) {
        cells[i].innerText = val;
        cells[i].setAttribute("data-value", val);
      }
    }
  }

  function buildBoard() {
    boardContainer.innerHTML = "";
    for (let i = 0; i < 225; i++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.addEventListener("click", (function(idx) {
        return () => onCellClick(idx);
      })(i));
      boardContainer.appendChild(cell);
    }
  }

  function onCellClick(index) {
    if (!room) {
      statusMsgDiv.innerText = "⚠️ Hãy tạo hoặc tham gia phòng!";
      return;
    }
    if (!player) {
      statusMsgDiv.innerText = "⚠️ Bạn chưa tham gia với vai X hoặc O!";
      return;
    }
    
    const roomRef = db.ref(room);
    roomRef.once("value", (snap) => {
      const data = snap.val();
      if (!data) {
        statusMsgDiv.innerText = "❌ Phòng không tồn tại!";
        return;
      }
      
      const boardArr = data.board || Array(225).fill("");
      const turn = data.turn;
      
      if (data.winner && data.winner !== "") {
        statusMsgDiv.innerText = `🏆 Trận đã kết thúc! ${data.winner} thắng.`;
        return;
      }
      
      if (boardArr[index] !== "") {
        statusMsgDiv.innerText = "❌ Ô này đã có quân!";
        return;
      }
      if (turn !== player) {
        statusMsgDiv.innerText = `⏳ Lượt của ${turn}, chưa tới bạn!`;
        return;
      }
      
      boardArr[index] = player;
      const newTurn = player === "X" ? "O" : "X";
      const isWin = checkWinner(boardArr, index, player);
      
      const updateData = { board: boardArr, turn: newTurn };
      if (isWin) {
        updateData.winner = player;
        updateData.gameOver = true;
        statusMsgDiv.innerText = `🎉 CHIẾN THẮNG! ${player} thắng cuộc! 🎉`;
      }
      
      roomRef.update(updateData).then(() => {
        if (!isWin) statusMsgDiv.innerText = `✅ Đã đánh! Lượt: ${newTurn}`;
      }).catch(() => statusMsgDiv.innerText = "Lỗi kết nối!");
    });
  }

  function subscribeRoom() {
    if (!room) return;
    const roomRef = db.ref(room);
    roomRef.off();
    roomRef.on("value", (snap) => {
      const data = snap.val();
      if (!data) {
        if (room) statusMsgDiv.innerText = "⚠️ Phòng đã đóng!";
        resetUI();
        return;
      }
      
      const boardArr = data.board || Array(225).fill("");
      const turn = data.turn || "X";
      const winner = data.winner;
      
      renderBoard(boardArr);
      
      // Cập nhật mã phòng trên đầu
      roomCodeTop.innerHTML = `🔑 MÃ PHÒNG: <strong style="font-size:1.2rem;">${room}</strong> 🔑<span>⭐ Gửi mã này cho bạn để cùng chơi ⭐</span>`;
      roomCodeTop.style.background = "linear-gradient(135deg, #2ecc71, #27ae60)";
      roomCodeTop.style.color = "white";
      roomCodeDisplaySpan.innerHTML = `🔑 Mã: ${room}`;
      
      if (winner && winner !== "") {
        turnTextSpan.innerText = winner === "X" ? "❌ X THẮNG" : "⭕ O THẮNG";
        pieceBadgeDiv.innerText = winner === "X" ? "❌" : "⭕";
        pieceBadgeDiv.style.background = winner === "X" ? "#e63946" : "#3b82f6";
        statusMsgDiv.innerHTML = `🏆 KẾT THÚC! ${winner} thắng. Tạo phòng mới để chơi tiếp. 🏆`;
        return;
      }
      
      if (player === "X" || player === "O") {
        if (turn === player) {
          turnTextSpan.innerText = `Lượt của bạn (${player})`;
          pieceBadgeDiv.innerText = player;
          pieceBadgeDiv.style.background = player === "X" ? "#e63946" : "#3b82f6";
          statusMsgDiv.innerHTML = `✨ Lượt của bạn (${player})! Hãy đặt quân ✨`;
        } else {
          const opp = player === "X" ? "O" : "X";
          turnTextSpan.innerText = `Lượt: ${opp}`;
          pieceBadgeDiv.innerText = opp;
          pieceBadgeDiv.style.background = opp === "X" ? "#e63946" : "#3b82f6";
          statusMsgDiv.innerHTML = `⏳ Đợi đối thủ (${opp}) đánh...`;
        }
      } else {
        turnTextSpan.innerText = "Chưa tham gia";
        pieceBadgeDiv.innerText = "?";
        pieceBadgeDiv.style.background = "#aa8c54";
      }
    });
  }

  function resetUI() {
    room = "";
    player = "";
    const cells = boardContainer.querySelectorAll(".cell");
    cells.forEach(cell => {
      cell.innerText = "";
      cell.setAttribute("data-value", "");
    });
    turnTextSpan.innerText = "Chưa vào phòng";
    pieceBadgeDiv.innerText = "🎮";
    pieceBadgeDiv.style.background = "#aa8c54";
    roomCodeDisplaySpan.innerHTML = "🏠 Chưa có phòng";
    roomCodeTop.innerHTML = "🏠 Chưa có phòng";
    roomCodeTop.style.background = "linear-gradient(135deg, #f7b32b, #e69500)";
    roomCodeTop.style.color = "#2c1e0c";
    statusMsgDiv.innerHTML = "✨ Tạo hoặc tham gia phòng để chơi cùng bạn bè ✨";
  }

  function createRoom() {
    if (room) {
      db.ref(room).off();
    }
    const newRoom = "room_" + Math.floor(Math.random() * 100000);
    room = newRoom;
    player = "X";
    
    const initialBoard = Array(225).fill("");
    db.ref(room).set({
      board: initialBoard,
      turn: "X",
      winner: null,
      gameOver: false
    }).then(() => {
      buildBoard();
      subscribeRoom();
      statusMsgDiv.innerHTML = `🎲 Đã tạo phòng: ${room}. Bạn là X. Mời bạn bè nhập mã này!`;
    }).catch(() => {
      statusMsgDiv.innerHTML = "Lỗi tạo phòng!";
      room = "";
      player = "";
    });
  }

  function joinRoom() {
    const roomCode = roomIdInput.value.trim();
    if (!roomCode) {
      statusMsgDiv.innerHTML = "⚠️ Nhập mã phòng!";
      return;
    }
    
    const roomRef = db.ref(roomCode);
    roomRef.once("value", (snap) => {
      const data = snap.val();
      if (!data) {
        statusMsgDiv.innerHTML = "❌ Phòng không tồn tại!";
        return;
      }
      if (data.winner && data.winner !== "") {
        statusMsgDiv.innerHTML = `⚠️ Phòng đã kết thúc (${data.winner} thắng).`;
        return;
      }
      
      if (room) db.ref(room).off();
      room = roomCode;
      player = "O";
      buildBoard();
      subscribeRoom();
      statusMsgDiv.innerHTML = `✅ Đã vào phòng ${room} với vai O. Chờ đối thủ (X) hoặc bắt đầu!`;
    }).catch(() => statusMsgDiv.innerHTML = "Lỗi kết nối!");
  }

  document.getElementById("createRoomBtn").onclick = () => {
    if (room) db.ref(room).off();
    resetUI();
    createRoom();
  };
  
  document.getElementById("joinRoomBtn").onclick = () => {
    if (room) db.ref(room).off();
    resetUI();
    joinRoom();
  };

  // Khởi tạo bàn cờ trống
  function init() {
    boardContainer.innerHTML = "";
    for (let i = 0; i < 225; i++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      cell.addEventListener("click", (function(idx) {
        return () => {
          if (!room) statusMsgDiv.innerText = "Hãy tạo hoặc tham gia phòng trước!";
          else onCellClick(idx);
        };
      })(i));
      boardContainer.appendChild(cell);
    }
    resetUI();
  }
  
  init();
</script>
</body>
</html>
